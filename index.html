<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* ================= SIDEBAR ================= */

.sidebar{
width:220px;
background:#111;
height:100vh;
padding:15px;
position:fixed;
left:0;
top:0;
overflow:auto;
transition:0.3s;
}

.sidebar button{
width:100%;
margin:6px 0;
}

/* Hidden state */

.sidebar.hidden{
transform:translateX(-230px);
}

/* ================= MAIN ================= */

.main{
margin-left:220px;
padding:20px;
transition:0.3s;
}

.section{
display:none;
}

.card{
background:#1c1c1c;
padding:15px;
border-radius:10px;
margin:10px 0;
}

button{
background:#00e676;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

input,select{
width:100%;
padding:8px;
margin:5px 0;
border-radius:6px;
border:none;
box-sizing:border-box;
}

/* ================= MOBILE ================= */

.menu-toggle{
display:none;
position:fixed;
top:15px;
left:15px;
z-index:3000;
}

@media(max-width:768px){

.sidebar{
transform:translateX(-230px);
}

.sidebar.active{
transform:translateX(0);
}

.main{
margin-left:0;
}

.menu-toggle{
display:block;
}

}

</style>
</head>
<body>

<!-- MOBILE TOGGLE -->
<button class="menu-toggle" onclick="toggleSidebar()">☰</button>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<h2>Dashboard</h2>

<button onclick="showSection('home')">Home</button>
<button onclick="showSection('products')">Products</button>
<button onclick="showSection('routes')">Routes</button>
<button onclick="showSection('users')">Users</button>
<button onclick="showSection('analytics')">Analytics</button>

</div>

<!-- MAIN CONTENT -->
<div class="main">

<div id="homeSection" class="section">
<h2>Home</h2>
<p>System Loaded Successfully ✅</p>
</div>

<div id="productsSection" class="section">
<h2>Products</h2>
<input placeholder="Product Name">
<button>Add</button>
</div>

<div id="routesSection" class="section">
<h2>Routes</h2>
<p>Route system ready</p>
</div>

<div id="usersSection" class="section">
<h2>Users</h2>
<p>User management ready</p>
</div>

<div id="analyticsSection" class="section">
<h2>Analytics</h2>
<p>Stats here</p>
</div>

</div>

<script>

/* Sidebar Toggle */

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("active");
}

/* Section Switch */

function showSection(section){

document.querySelectorAll(".section").forEach(s=>{
s.style.display="none";
});

document.getElementById(section+"Section").style.display="block";

}

/* Default Load */

document.addEventListener("DOMContentLoaded",()=>{
showSection("home");
});

</script>

</body>
</html>
