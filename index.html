<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DayNight Vending</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
{box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#1e3c72,#2a5298);
}

/ Card /
.card{
background:white;
padding:40px 35px;
border-radius:16px;
width:340px;
box-shadow:0 15px 35px rgba(0,0,0,.25);
position:relative;
animation:fadeIn .5s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(15px)}
to{opacity:1;transform:translateY(0)}
}

/ Online status badge /
.status{
position:absolute;
top:-18px;
left:50%;
transform:translateX(-50%);
padding:6px 16px;
border-radius:20px;
color:white;
font-weight:bold;
font-size:14px;
}
.online{background:#28a745}
.offline{background:#dc3545}

/ Title /
h2{
text-align:center;
margin-bottom:25px;
color:#1e3c72;
}

/ Inputs /
input{
width:100%;
padding:13px;
margin:8px 0;
border-radius:10px;
border:1px solid #ccc;
font-size:15px;
transition:.2s;
}
input:focus{
border-color:#1e3c72;
outline:none;
box-shadow:0 0 0 2px rgba(30,60,114,.15);
}

/ Button /
button{
width:100%;
padding:13px;
margin-top:14px;
border:none;
border-radius:10px;
background:#1e3c72;
color:white;
font-size:16px;
cursor:pointer;
transition:.25s;
}
button:hover{background:#2a5298}

/ Error /
#error{
color:#dc3545;
text-align:center;
margin-top:10px;
font-size:14px;
}

/ Footer */
.footer{
text-align:center;
margin-top:18px;
font-size:12px;
color:#777;
}
</style>
</head>

<body>

<div class="card">

<div id="status" class="status online">Online</div>

<h2>DayNight Vending</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div id="error"></div>

<div class="footer">
Secure access panel
</div>

</div>

<script>
// Demo users (temporary until database auth later)
const users=[
{username:"admin",password:"admin123",role:"admin"},
{username:"driver1",password:"driver123",role:"driver"},
{username:"driver2",password:"driver123",role:"driver"}
];

function login(){
const u=document.getElementById("username").value.trim();
const p=document.getElementById("password").value;
const error=document.getElementById("error");

const user=users.find(x=>x.username===u&&x.password===p);

if(!user){
error.innerText="Invalid username or password";
return;
}

// Save session
localStorage.setItem("dnv_session",JSON.stringify(user));

// Redirect
if(user.role==="admin")
window.location.href="admin.html";
else
window.location.href="driver.html";
}

// Auto redirect if already logged in
const session=localStorage.getItem("dnv_session");
if(session){
const user=JSON.parse(session);
window.location.href=user.role==="admin"?"admin.html":"driver.html";
}

// Online/offline indicator
const statusBadge=document.getElementById("status");

function updateStatus(){
if(navigator.onLine){
statusBadge.className="status online";
statusBadge.textContent="Online";
}else{
statusBadge.className="status offline";
statusBadge.textContent="Offline";
}
}

window.addEventListener("online",updateStatus);
window.addEventListener("offline",updateStatus);
updateStatus();
</script>

</body>
</html>
