<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DayNight Vending</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#020617,#0f172a);
    font-family:Arial,Helvetica,sans-serif;
    color:white;
}

.statusBar{
    position:fixed;
    top:0;
    left:0;
    right:0;
    padding:8px;
    text-align:center;
    font-weight:bold;
    background:#111827;
}

.online{color:#22c55e;}
.offline{color:#ef4444;}

.card{
    background:#020617;
    padding:40px;
    border-radius:14px;
    width:320px;
    box-shadow:0 10px 40px rgba(0,0,0,.7);
}

h1{
    text-align:center;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:10px;
    background:#1e293b;
    color:white;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{background:#1d4ed8;}

.error{
    margin-top:12px;
    color:#ef4444;
    text-align:center;
}
</style>
</head>
<body>

<div class="statusBar" id="status">Checking connection...</div>

<div class="card">
    <h1>DayNight Vending</h1>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div class="error" id="error"></div>
</div>

<script>

/* ---------- DATABASE INIT ---------- */
if(!localStorage.getItem("DNV_DB")){
    localStorage.setItem("DNV_DB",JSON.stringify({
        users:[{username:"admin",password:"admin123",role:"admin"}],
        currentUser:null
    }));
}

function getDB(){
    return JSON.parse(localStorage.getItem("DNV_DB"));
}

function saveDB(db){
    localStorage.setItem("DNV_DB",JSON.stringify(db));
}

/* ---------- ONLINE STATUS ---------- */
function updateStatus(){
    const s=document.getElementById("status");
    if(navigator.onLine){
        s.textContent="ONLINE";
        s.className="statusBar online";
    }else{
        s.textContent="OFFLINE";
        s.className="statusBar offline";
    }
}
window.addEventListener("online",updateStatus);
window.addEventListener("offline",updateStatus);
updateStatus();

/* ---------- LOGIN ---------- */
function login(){
    const username=document.getElementById("user").value.trim();
    const password=document.getElementById("pass").value.trim();
    const db=getDB();

    const user=db.users.find(u=>u.username===username && u.password===password);

    if(!user){
        document.getElementById("error").textContent="Invalid login";
        return;
    }

    db.currentUser=user.username;
    saveDB(db);

    if(user.role==="admin")
        window.location="admin.html";
    else
        window.location="driver.html";
}

</script>

</body>
</html>
