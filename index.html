<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enterprise System</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

/* ================= SIDEBAR ================= */

.sidebar{
width:220px;
height:100vh;
background:#1c1c1c;
padding:20px;
position:fixed;
left:0;
top:0;
z-index:1000;
box-sizing:border-box;
}

.sidebar button{
width:100%;
margin:6px 0;
}

/* ================= MAIN ================= */

.main{
margin-left:220px;
padding:30px;
}

.section{
display:none;
}

.card{
background:#222;
padding:15px;
border-radius:10px;
margin:10px 0;
}

button{
background:#00e676;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:0.8;
}

input,select{
width:100%;
padding:8px;
margin:6px 0;
border-radius:6px;
border:none;
box-sizing:border-box;
background:#2a2a2a;
color:white;
}

/* ================= MOBILE ================= */

.menu-toggle{
display:none;
position:fixed;
top:15px;
left:15px;
z-index:2000;
}

@media(max-width:768px){

.sidebar{
transform:translateX(-240px);
transition:0.3s;
}

.sidebar.active{
transform:translateX(0);
}

.main{
margin-left:0;
}

.menu-toggle{
display:block;
}

}

</style>
</head>
<body>

<!-- MOBILE MENU BUTTON -->

<button class="menu-toggle" onclick="toggleSidebar()">☰ Menu</button>

<!-- ================= SIDEBAR ================= -->

<div class="sidebar" id="sidebar">

<h2>Dashboard</h2>

<button onclick="showSection('home')">Home</button>
<button onclick="showSection('products')">Products</button>
<button onclick="showSection('routes')">Routes</button>
<button onclick="showSection('users')">Users</button>
<button onclick="showSection('analytics')">Analytics</button>

</div>

<!-- ================= MAIN CONTENT ================= -->

<div class="main">

<!-- HOME -->

<div id="homeSection" class="section">
<div class="card">
<h2>Welcome ✅</h2>
<p>System Loaded Successfully</p>
</div>
</div>

<!-- PRODUCTS -->

<div id="productsSection" class="section">

<div class="card">
<h2>📦 Products</h2>

<input id="productName" placeholder="Product Name">
<input id="productPrice" type="number" placeholder="Price">
<input id="productStock" type="number" placeholder="Stock">

<button onclick="addProduct()">Add Product</button>

</div>

<div id="productList"></div>

</div>

<!-- ROUTES -->

<div id="routesSection" class="section">

<div class="card">
<h2>🗺 Routes</h2>

<input id="routeName" placeholder="Route Name">
<input id="routeAddress" placeholder="Address">

<button onclick="addRoute()">Add Route</button>

</div>

<input id="routeSearch" placeholder="Search Routes" onkeyup="renderRoutes()">

<div id="routeList"></div>

</div>

<!-- USERS -->

<div id="usersSection" class="section">

<div class="card">
<h2>👤 Users</h2>

<input id="newUsername" placeholder="Username">
<input id="newPassword" type="password" placeholder="Password">

<select id="newRole">
<option value="admin">Admin</option>
<option value="manager">Manager</option>
<option value="driver">Driver</option>
</select>

<button onclick="createUser()">Create User</button>

</div>

<div id="userList"></div>

</div>

<!-- ANALYTICS -->

<div id="analyticsSection" class="section">

<div class="card">
<h2>📊 Analytics</h2>
<div id="statsBox"></div>
</div>

</div>

</div>

<script>

/* ================= SIDEBAR ================= */

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("active");
}

/* ================= SECTION SWITCH ================= */

function showSection(section){

document.querySelectorAll(".section").forEach(s=>{
s.style.display="none";
});

document.getElementById(section+"Section").style.display="block";

if(section==="products") renderProducts();
if(section==="routes") renderRoutes();
if(section==="users") renderUsers();
if(section==="analytics") renderAnalytics();

}

/* ================= PRODUCTS ================= */

function getProducts(){
return JSON.parse(localStorage.getItem("products")||"[]");
}

function saveProducts(p){
localStorage.setItem("products",JSON.stringify(p));
}

function addProduct(){

let name=document.getElementById("productName").value;
let price=parseFloat(document.getElementById("productPrice").value);
let stock=parseInt(document.getElementById("productStock").value);

if(!name || isNaN(price) || isNaN(stock)){
alert("Fill all fields");
return;
}

let products=getProducts();

products.push({name,price,stock});

saveProducts(products);
renderProducts();

}

function renderProducts(){

let container=document.getElementById("productList");
container.innerHTML="";

getProducts().forEach((p,index)=>{

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<b>${p.name}</b><br>
Price: $${p.price}<br>
Stock: ${p.stock}<br>
<button onclick="deleteProduct(${index})">Delete</button>
`;

container.appendChild(div);

});

}

function deleteProduct(index){

let products=getProducts();
products.splice(index,1);
saveProducts(products);
renderProducts();

}

/* ================= ROUTES ================= */

function getRoutes(){
return JSON.parse(localStorage.getItem("routes")||"[]");
}

function saveRoutes(r){
localStorage.setItem("routes",JSON.stringify(r));
}

function addRoute(){

let name=document.getElementById("routeName").value;
let address=document.getElementById("routeAddress").value;

if(!name || !address){
alert("Fill route info");
return;
}

let routes=getRoutes();

routes.push({
name,
address,
status:"Pending"
});

saveRoutes(routes);
renderRoutes();

}

function renderRoutes(){

let search=document.getElementById("routeSearch").value?.toLowerCase()||"";
let container=document.getElementById("routeList");
container.innerHTML="";

let routes=getRoutes();

routes = routes.filter(r =>
r.name.toLowerCase().includes(search) ||
r.address.toLowerCase().includes(search)
);

routes.forEach((r,index)=>{

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<b>${r.name}</b><br>
📍 ${r.address}<br>
Status: ${r.status}<br>
<button onclick="deleteRoute(${index})">Delete</button>
`;

container.appendChild(div);

});

}

function deleteRoute(index){

let routes=getRoutes();
routes.splice(index,1);
saveRoutes(routes);
renderRoutes();

}

/* ================= USERS ================= */

function getUsers(){
return JSON.parse(localStorage.getItem("users")||"[]");
}

function saveUsers(u){
localStorage.setItem("users",JSON.stringify(u));
}

if(getUsers().length===0){
saveUsers([{username:"admin",password:"admin",role:"admin"}]);
}

function createUser(){

let users=getUsers();

users.push({
username:document.getElementById("newUsername").value,
password:document.getElementById("newPassword").value,
role:document.getElementById("newRole").value
});

saveUsers(users);
renderUsers();

}

function renderUsers(){

let container=document.getElementById("userList");
container.innerHTML="";

getUsers().forEach(u=>{

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<b>${u.username}</b><br>
Role: ${u.role}
`;

container.appendChild(div);

});

}

/* ================= ANALYTICS ================= */

function renderAnalytics(){

let products=getProducts();
let users=getUsers();

let stock=0;
let revenue=0;

products.forEach(p=>{
stock+=p.stock;
revenue+=(p.price||0)*(p.sales||0);
});

document.getElementById("statsBox").innerHTML=`
Products: ${products.length}<br>
Stock: ${stock}<br>
Users: ${users.length}<br>
Revenue: $${revenue}
`;

}

/* ================= INIT ================= */

document.addEventListener("DOMContentLoaded",()=>{
showSection("home");
});

</script>

</body>
</html>
