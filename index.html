<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enterprise System</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

/* ================= LOGIN ================= */

#loginPage{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.loginBox{
background:#1c1c1c;
padding:40px;
border-radius:12px;
width:300px;
}

.loginBox input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:none;
box-sizing:border-box;
}

.loginBox button{
width:100%;
background:#00e676;
border:none;
padding:10px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

/* ================= SIDEBAR ================= */

.sidebar{
width:220px;
height:100vh;
background:#1c1c1c;
padding:20px;
position:fixed;
left:0;
top:0;
box-sizing:border-box;
}

.sidebar button{
width:100%;
margin:6px 0;
}

/* ================= MAIN ================= */

.main{
margin-left:220px;
padding:30px;
}

.section{
display:none;
}

.card{
background:#222;
padding:15px;
border-radius:10px;
margin:10px 0;
}

button{
background:#00e676;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

input,select{
width:100%;
padding:8px;
margin:6px 0;
border-radius:6px;
border:none;
box-sizing:border-box;
background:#2a2a2a;
color:white;
}

</style>
</head>
<body>

<!-- ================= LOGIN PAGE ================= -->

<div id="loginPage">

<div class="loginBox">

<h2>Login</h2>

<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</div>

<!-- ================= DASHBOARD ================= -->

<div id="dashboard" style="display:none;">

<!-- SIDEBAR -->

<div class="sidebar">

<h3>Dashboard</h3>

<div id="sidebarButtons"></div>

<button onclick="logout()">Logout</button>

</div>

<!-- MAIN -->

<div class="main">

<!-- HOME -->

<div id="homeSection" class="section">
<div class="card">
<h2>Welcome</h2>
<p>System Loaded Successfully</p>
</div>
</div>

<!-- PRODUCTS -->

<div id="productsSection" class="section">

<div class="card">
<h2>Products</h2>

<input id="productName" placeholder="Product Name">
<input id="productPrice" type="number" placeholder="Price">
<input id="productStock" type="number" placeholder="Stock">

<button onclick="addProduct()">Add Product</button>

</div>

<div id="productList"></div>

</div>

<!-- ROUTES -->

<div id="routesSection" class="section">

<div class="card">
<h2>Routes</h2>

<input id="routeName" placeholder="Route Name">
<input id="routeAddress" placeholder="Address">

<button onclick="addRoute()">Add Route</button>

</div>

<input id="routeSearch" placeholder="Search" onkeyup="renderRoutes()">
<div id="routeList"></div>

</div>

<!-- USERS -->

<div id="usersSection" class="section">

<div class="card">
<h2>Create User</h2>

<input id="newUsername" placeholder="Username">
<input id="newPassword" type="password" placeholder="Password">

<select id="newRole">
<option value="admin">Admin</option>
<option value="manager">Manager</option>
<option value="driver">Driver</option>
</select>

<button onclick="createUser()">Create User</button>

</div>

<div id="userList"></div>

</div>

</div>
</div>

<script>

/* ================= USERS DATABASE ================= */

function getUsers(){
return JSON.parse(localStorage.getItem("users")||"[]");
}

function saveUsers(u){
localStorage.setItem("users",JSON.stringify(u));
}

/* Default Admin */

if(getUsers().length===0){
saveUsers([{username:"admin",password:"admin",role:"admin"}]);
}

/* ================= LOGIN ================= */

function login(){

let user=getUsers().find(u =>
u.username===document.getElementById("loginUser").value &&
u.password===document.getElementById("loginPass").value
);

if(!user){
alert("Invalid Login");
return;
}

localStorage.setItem("currentUser",JSON.stringify(user));

document.getElementById("loginPage").style.display="none";
document.getElementById("dashboard").style.display="block";

loadDashboard();

}

function logout(){
localStorage.removeItem("currentUser");
location.reload();
}

/* ================= DASHBOARD LOAD ================= */

function loadDashboard(){

let user=JSON.parse(localStorage.getItem("currentUser"));

let sidebar=document.getElementById("sidebarButtons");
sidebar.innerHTML="";

/* Role Based Access */

let buttons=[

{label:"Home",section:"home"},
{label:"Products",section:"products"},
{label:"Routes",section:"routes"}

];

if(user.role==="admin"){
buttons.push({label:"Users",section:"users"});
}

/* Render Buttons */

buttons.forEach(b=>{

let btn=document.createElement("button");
btn.innerText=b.label;
btn.onclick=()=>showSection(b.section);
sidebar.appendChild(btn);

});

showSection("home");

}

/* ================= SECTION SWITCH ================= */

function showSection(section){

document.querySelectorAll(".section").forEach(s=>{
s.style.display="none";
});

document.getElementById(section+"Section").style.display="block";

if(section==="products") renderProducts();
if(section==="routes") renderRoutes();
if(section==="users") renderUsers();

}

/* ================= PRODUCTS ================= */

function getProducts(){
return JSON.parse(localStorage.getItem("products")||"[]");
}

function saveProducts(p){
localStorage.setItem("products",JSON.stringify(p));
}

function addProduct(){

let products=getProducts();

products.push({
name:document.getElementById("productName").value,
price:parseFloat(document.getElementById("productPrice").value),
stock:parseInt(document.getElementById("productStock").value)
});

saveProducts(products);
renderProducts();

}

function renderProducts(){

let container=document.getElementById("productList");
container.innerHTML="";

getProducts().forEach((p,index)=>{

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<b>${p.name}</b><br>
Price: $${p.price}<br>
Stock: ${p.stock}<br>
<button onclick="deleteProduct(${index})">Delete</button>
`;

container.appendChild(div);

});

}

function deleteProduct(index){

let products=getProducts();
products.splice(index,1);
saveProducts(products);
renderProducts();

}

/* ================= ROUTES ================= */

function getRoutes(){
return JSON.parse(localStorage.getItem("routes")||"[]");
}

function saveRoutes(r){
localStorage.setItem("routes",JSON.stringify(r));
}

function addRoute(){

let routes=getRoutes();

routes.push({
name:document.getElementById("routeName").value,
address:document.getElementById("routeAddress").value,
status:"Pending"
});

saveRoutes(routes);
renderRoutes();

}

function renderRoutes(){

let search=document.getElementById("routeSearch").value?.toLowerCase()||"";
let container=document.getElementById("routeList");
container.innerHTML="";

let routes=getRoutes();

routes = routes.filter(r =>
r.name.toLowerCase().includes(search) ||
r.address.toLowerCase().includes(search)
);

routes.forEach((r,index)=>{

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<b>${r.name}</b><br>
${r.address}<br>
Status: ${r.status}
<button onclick="deleteRoute(${index})">Delete</button>
`;

container.appendChild(div);

});

}

function deleteRoute(index){

let routes=getRoutes();
routes.splice(index,1);
saveRoutes(routes);
renderRoutes();

}

/* ================= USERS ================= */

function createUser(){

let users=getUsers();

users.push({
username:document.getElementById("newUsername").value,
password:document.getElementById("newPassword").value,
role:document.getElementById("newRole").value
});

saveUsers(users);
renderUsers();

}

function renderUsers(){

let container=document.getElementById("userList");
container.innerHTML="";

getUsers().forEach(u=>{

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<b>${u.username}</b><br>
Role: ${u.role}
`;

container.appendChild(div);

});

}

/* ================= INIT ================= */

document.addEventListener("DOMContentLoaded",()=>{

let user=localStorage.getItem("currentUser");

if(user){
document.getElementById("loginPage").style.display="none";
document.getElementById("dashboard").style.display="block";
loadDashboard();
}

});

</script>

</body>
</html>
