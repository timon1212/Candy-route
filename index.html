}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DayNight Vending Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;font-family:Arial}
body{
display:flex;justify-content:center;align-items:center;height:100vh;
background:linear-gradient(135deg,#1e3c72,#2a5298);margin:0;
}
.card{
background:white;padding:35px;border-radius:15px;width:350px;
box-shadow:0 10px 25px rgba(0,0,0,.25);position:relative;
}
.status{
position:absolute;top:-18px;left:50%;transform:translateX(-50%);
padding:6px 14px;border-radius:20px;color:white;font-weight:bold;font-size:14px;
}
.online{background:#28a745}
.offline{background:#dc3545}
h2{text-align:center;margin-bottom:20px;color:#1e3c72}
input{
width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #ccc;
}
button{
width:100%;padding:12px;margin-top:15px;background:#1e3c72;color:white;
border:none;border-radius:8px;font-size:16px;cursor:pointer;
}
button:hover{background:#2a5298}
#error{text-align:center;color:red;margin-top:10px}
</style>
</head>

<body>
<div class="card">
<div id="status" class="status online">Online</div>
<h2>DayNight Vending</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<div id="error"></div>
</div>

<script>
const users=[
{username:"admin",password:"admin123",role:"admin"},
{username:"driver1",password:"driver123",role:"driver"},
{username:"driver2",password:"driver123",role:"driver"}
];

function login(){
const u=username.value.trim();
const p=password.value;
const user=users.find(x=>x.username===u&&x.password===p);
if(!user){error.innerText="Invalid login";return;}
localStorage.setItem("dnv_user",JSON.stringify(user));
location.href=user.role==="admin"?"admin.html":"driver.html";
}

const session=localStorage.getItem("dnv_user");
if(session){
const user=JSON.parse(session);
location.href=user.role==="admin"?"admin.html":"driver.html";
}

function updateStatus(){
status.className="status "+(navigator.onLine?"online":"offline");
status.innerText=navigator.onLine?"Online":"Offline";
}
window.addEventListener("online",updateStatus);
window.addEventListener("offline",updateStatus);
updateStatus();
</script>
</body>
</html
