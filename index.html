<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candy Route Manager</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#121212;
    color:white;
    padding:20px;
}
h2,h3{
    margin-top:30px;
}
input, select, button{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:6px;
    border:none;
}
button{
    background:#00c853;
    color:white;
    font-weight:bold;
}
button.danger{
    background:#c62828;
}
.card{
    background:#1e1e1e;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
}
.small{
    font-size:14px;
    opacity:0.8;
}
</style>
</head>

<body>

<h2>Login</h2>

<input id="username" placeholder="Username">
<select id="role">
    <option value="admin">Admin</option>
    <option value="worker">Worker</option>
</select>
<button onclick="login()">Login</button>

<div id="app" style="display:none;">

<h2>Dashboard</h2>
<p id="welcome"></p>
<button class="danger" onclick="logout()">Logout</button>

<h3>Add Product</h3>
<input id="productName" placeholder="Product Name">
<input id="productCost" type="number" step="0.01" placeholder="Cost Per Unit">
<input id="productPrice" type="number" step="0.01" placeholder="Selling Price">
<input id="productStock" type="number" placeholder="Stock Quantity">
<button onclick="addProduct()">Add Product</button>

<h3>Products</h3>
<div id="products"></div>

</div>

<script>

let currentUser = null;

function login(){
    const username = document.getElementById("username").value;
    const role = document.getElementById("role").value;

    if(!username){
        alert("Enter username");
        return;
    }

    currentUser = {username, role};
    localStorage.setItem("currentUser", JSON.stringify(currentUser));

    document.getElementById("app").style.display="block";
    document.getElementById("welcome").innerText = 
        "Logged in as: " + username + " (" + role + ")";
    
    renderProducts();
}

function logout(){
    localStorage.removeItem("currentUser");
    location.reload();
}

function getProducts(){
    return JSON.parse(localStorage.getItem("products") || "[]");
}

function saveProducts(products){
    localStorage.setItem("products", JSON.stringify(products));
}

function addProduct(){
    if(currentUser.role !== "admin"){
        alert("Only admin can add products.");
        return;
    }

    const name = document.getElementById("productName").value;
    const cost = parseFloat(document.getElementById("productCost").value);
    const price = parseFloat(document.getElementById("productPrice").value);
    const stock = parseInt(document.getElementById("productStock").value);

    if(!name || !cost || !price || !stock){
        alert("Fill all fields");
        return;
    }

    const products = getProducts();
    products.push({name, cost, price, stock});
    saveProducts(products);

    renderProducts();
}

function recordSale(index){
    const products = getProducts();
    if(products[index].stock <= 0){
        alert("Out of stock");
        return;
    }

    products[index].stock -= 1;
    saveProducts(products);
    renderProducts();
}

function renderProducts(){
    const container = document.getElementById("products");
    container.innerHTML = "";

    const products = getProducts();

    products.forEach((p, index)=>{
        const profit = (p.price - p.cost).toFixed(2);

        const div = document.createElement("div");
        div.className="card";

        div.innerHTML = `
            <strong>${p.name}</strong><br>
            <span class="small">Cost: $${p.cost}</span><br>
            <span class="small">Price: $${p.price}</span><br>
            <span class="small">Stock: ${p.stock}</span><br>
            <span class="small">Profit Per Unit: $${profit}</span><br>
            <button onclick="recordSale(${index})">Record Sale</button>
        `;

        container.appendChild(div);
    });
}

window.onload = function(){
    const savedUser = localStorage.getItem("currentUser");
    if(savedUser){
        currentUser = JSON.parse(savedUser);
        document.getElementById("app").style.display="block";
        document.getElementById("welcome").innerText =
            "Logged in as: " + currentUser.username + 
            " (" + currentUser.role + ")";
        renderProducts();
    }
};

</script>

</body>
</html>
