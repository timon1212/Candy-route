<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enterprise Control System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

.sidebar{
width:220px;
height:100vh;
background:#1c1c1c;
padding:20px;
position:fixed;
left:0;
top:0;
box-sizing:border-box;
}

.sidebar button{
width:100%;
margin:6px 0;
}

.main{
margin-left:220px;
padding:30px;
}

.section{ display:none; }

.card{
background:#222;
padding:15px;
border-radius:10px;
margin:10px 0;
}

button{
background:#00e676;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

input{
width:100%;
padding:8px;
margin:6px 0;
border-radius:6px;
border:none;
background:#2a2a2a;
color:white;
box-sizing:border-box;
}
</style>
</head>
<body>

<div class="sidebar">
<h3>System</h3>
<div id="sidebarButtons"></div>
<button onclick="logout()">Logout</button>
</div>

<div class="main">

<!-- ROUTES -->
<div id="routesSection" class="section">
<div class="card">
<h2>🚛 Routes</h2>

<input id="routeName" placeholder="Route Name">
<input id="routeAddress" placeholder="Route Address">

<button onclick="addRoute()">Add Route</button>

<div id="routesList"></div>

</div>
</div>

<!-- REPUTATION -->
<div id="reputationSection" class="section">
<div class="card">
<h2>⭐ Reputation</h2>
<button onclick="renderReputation()">Refresh</button>
<div id="reputationContent"></div>
</div>
</div>

<!-- AI -->
<div id="aiSection" class="section">
<div class="card">
<h2>🧠 Smart AI</h2>
<button onclick="runAI()">Run AI Analysis</button>
<pre id="aiOutput" style="white-space:pre-wrap;"></pre>
</div>
</div>

</div>

<script>

/* =====================================================
   STORAGE HELPERS
===================================================== */

function getUsers(){
return JSON.parse(localStorage.getItem("users")||"[]");
}

function getRoutes(){
return JSON.parse(localStorage.getItem("routes")||"[]");
}

function saveRoutes(routes){
localStorage.setItem("routes",JSON.stringify(routes));
}

/* =====================================================
   ROUTE SYSTEM
===================================================== */

function addRoute(){

let routes=getRoutes();

routes.push({
name:document.getElementById("routeName").value,
address:document.getElementById("routeAddress").value,
status:"Pending",
assignedTo:null
});

saveRoutes(routes);
renderRoutes();

}

function renderRoutes(){

let routes=getRoutes();
let container=document.getElementById("routesList");

if(!container) return;

let output="";

routes.forEach((r,index)=>{

output+=`
<div class="card">
<b>${r.name}</b><br>
📍 ${r.address}<br>
Status: ${r.status}<br>
Assigned: ${r.assignedTo || "Unassigned"}<br>

<button onclick="markComplete(${index})">Complete</button>
<button onclick="deleteRoute(${index})">Delete</button>

</div>
`;

});

container.innerHTML=output;

}

function markComplete(index){

let routes=getRoutes();
routes[index].status="Completed";
saveRoutes(routes);
renderRoutes();

}

function deleteRoute(index){

let routes=getRoutes();
routes.splice(index,1);
saveRoutes(routes);
renderRoutes();

}

/* =====================================================
   REPUTATION SYSTEM
===================================================== */

function getReputation(){
return JSON.parse(localStorage.getItem("driverReputation")||"[]");
}

function saveReputation(data){
localStorage.setItem("driverReputation",JSON.stringify(data));
}

function updateReputation(){

let drivers=getUsers().filter(u=>u.role==="driver");
let routes=getRoutes();
let reputation=getReputation();

drivers.forEach(driver=>{

let driverRoutes=routes.filter(r=>r.assignedTo===driver.username);

let completed=driverRoutes.filter(r=>r.status==="Completed").length;
let total=driverRoutes.length;

let score= total===0 ? 50 : (completed/total)*100;
score=Math.max(0,Math.min(100,score));

let existing=reputation.find(r=>r.driver===driver.username);

if(existing){
existing.score=score;
existing.date=new Date().toISOString();
}else{
reputation.push({
driver:driver.username,
score:score,
date:new Date().toISOString()
});
}

});

saveReputation(reputation);

}

function renderReputation(){

updateReputation();

let reputation=getReputation();
reputation.sort((a,b)=>b.score-a.score);

let output="<h3>Driver Rankings</h3>";

reputation.forEach((r,i)=>{

let medal="";
if(i===0) medal="🥇";
else if(i===1) medal="🥈";
else if(i===2) medal="🥉";

output+=`
<div class="card">
${medal} ${r.driver}<br>
⭐ ${r.score.toFixed(2)}/100
</div>
`;

});

document.getElementById("reputationContent").innerHTML=output;

}

/* =====================================================
   SMART INSTANT AI
===================================================== */

function runAI(){

let routes=getRoutes();
let reputation=getReputation();

let completed=routes.filter(r=>r.status==="Completed").length;
let pending=routes.filter(r=>r.status==="Pending").length;

let lowRep=reputation.filter(r=>r.score<50);

let report="🤖 SYSTEM AI\n\n";
report+=`Completed Routes: ${completed}\n`;
report+=`Pending Routes: ${pending}\n\n`;

report+="⭐ Low Reputation Drivers\n";

lowRep.forEach(r=>{
report+=`${r.driver} (${r.score})\n`;
});

document.getElementById("aiOutput").innerText=report;

}

/* =====================================================
   SIDEBAR
===================================================== */

function loadSidebar(){

let buttons=[
{label:"Routes",section:"routes"},
{label:"Reputation",section:"reputation"},
{label:"AI",section:"ai"}
];

let container=document.getElementById("sidebarButtons");
container.innerHTML="";

buttons.forEach(b=>{
let btn=document.createElement("button");
btn.innerText=b.label;
btn.onclick=()=>showSection(b.section);
container.appendChild(btn);
});

}

function showSection(section){

document.querySelectorAll(".section")
.forEach(s=>s.style.display="none");

let el=document.getElementById(section+"Section");
if(el) el.style.display="block";

if(section==="routes") renderRoutes();
if(section==="reputation") renderReputation();

}

function logout(){
localStorage.removeItem("currentUser");
location.reload();
}

/* =====================================================
   INIT
===================================================== */

document.addEventListener("DOMContentLoaded",()=>{
loadSidebar();
showSection("routes");
});

</script>

</body>
</html>
