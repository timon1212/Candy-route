<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0f0f0f;
color:white;
}

/* Sidebar */

.sidebar{
width:220px;
height:100vh;
background:#111;
padding:20px;
position:fixed;
left:0;
top:0;
box-sizing:border-box;
}

.sidebar button{
width:100%;
margin:8px 0;
}

/* Main */

.main{
margin-left:220px;
padding:30px;
}

/* Cards */

.card{
background:#1c1c1c;
padding:20px;
border-radius:12px;
margin:15px 0;
box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

/* Buttons */

button{
background:#00e676;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

button:hover{
opacity:0.8;
}

/* Inputs */

input,select{
width:100%;
padding:10px;
margin:6px 0;
border-radius:6px;
border:none;
box-sizing:border-box;
background:#222;
color:white;
}

</style>
