<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vending SaaS Dashboard</title>
<style>
:root {
  --primary:#2563eb; --success:#22c55e; --danger:#ef4444; --warning:#f59e0b;
  --bg-light:#f0f2f5; --card-light:#fff; --text-light:#111;
  --bg-dark:#1e1e2f; --card-dark:#2c2c3c; --text-dark:#eee;
}
body{font-family:'Segoe UI',sans-serif;margin:0;padding:0;transition:.3s;}
.light-theme{background:var(--bg-light);color:var(--text-light);}
.dark-theme{background:var(--bg-dark);color:var(--text-dark);}
#themeToggle{position:fixed;top:10px;right:10px;padding:8px 12px;border-radius:6px;background:var(--primary);color:white;cursor:pointer;font-size:14px;z-index:100;transition:0.3s;}
#themeToggle:hover{opacity:0.9;}
#loginSection{display:flex;justify-content:center;align-items:center;height:100vh;background:linear-gradient(135deg,#2563eb,#22c55e);}
#loginCard{background:var(--card-light);padding:40px;border-radius:20px;box-shadow:0 20px 50px rgba(0,0,0,0.2);width:400px;text-align:center;transition:.3s;}
.dark-theme #loginCard{background:var(--card-dark);}
#loginCard h1{margin-bottom:30px;color:var(--primary);}
#loginCard input[type=text],#loginCard input[type=password]{width:100%;padding:12px 15px;margin:8px 0;border:1px solid #ccc;border-radius:8px;box-sizing:border-box;transition:.3s;}
.dark-theme #loginCard input{background:#3a3a4c;color:#eee;border:1px solid #555;}
#loginCard button{width:100%;padding:12px;background:var(--primary);color:white;border:none;border-radius:8px;margin-top:15px;cursor:pointer;font-weight:bold;transition:.3s;}
#loginCard button:hover{opacity:0.9;}
#loginCard .keep-signed{display:flex;align-items:center;justify-content:flex-start;margin:10px 0;font-size:14px;color:#555;}
#loginCard .keep-signed input{margin-right:5px;}
#loginCard #msg{color:red;margin-top:10px;font-size:14px;}

/* SIDEBAR + DASHBOARD */
#dashboard{display:flex;height:100vh;overflow:hidden;}
#sidebar{width:220px;background:var(--card-light);display:flex;flex-direction:column;padding-top:20px;transition:.3s;}
.dark-theme #sidebar{background:var(--card-dark);}
#sidebar button{padding:12px 20px;border:none;background:none;text-align:left;width:100%;cursor:pointer;font-size:16px;color:inherit;transition:.3s;}
#sidebar button:hover{background:rgba(0,0,0,.05);}
.dark-theme #sidebar button:hover{background:rgba(255,255,255,.1);}
#sidebar button.active{background:var(--primary);color:white;}
#mainContent{flex:1;padding:20px;overflow-y:auto;}

.card{background:var(--card-light);padding:20px;border-radius:12px;box-shadow:0 8px 25px rgba(0,0,0,.1);transition:.3s;margin-bottom:20px;}
.dark-theme .card{background:var(--card-dark);}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px;margin-bottom:20px;}
.summary-card{color:white;padding:20px;border-radius:12px;display:flex;flex-direction:column;justify-content:center;align-items:center;font-size:16px;font-weight:bold;transition:.5s;}
.summary-machines{background:#2563eb;}
.summary-products{background:#22c55e;}
.summary-sales{background:#f59e0b;}
.summary-expenses{background:#ef4444;}
canvas{margin-top:10px;width:100% !important;height:180px !important;cursor:pointer;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{padding:10px;text-align:left;border:1px solid #ccc;transition:0.3s;}
tr:nth-child(even){background:#f9f9f9;}
.dark-theme tr:nth-child(even){background:#3a3a4c;}
tr:hover{background:rgba(0,0,0,.05);}
.dark-theme tr:hover{background:rgba(255,255,255,.1);}
input,select,button,textarea{padding:10px;margin:5px 0;border-radius:6px;border:1px solid #ccc;box-sizing:border-box;transition:0.3s;}
.dark-theme input,.dark-theme select,.dark-theme textarea{background:#3a3a4c;color:#eee;border:1px solid #555;}
button.logout{background:var(--danger);margin:10px 0;padding:10px;color:white;border-radius:6px;cursor:pointer;}
button.delete{background:var(--danger);margin-left:5px;padding:5px;color:white;border-radius:6px;cursor:pointer;}
.hidden{display:none;}
.photo-gallery{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;}
.photo-gallery img{width:120px;height:80px;object-fit:cover;border-radius:8px;cursor:pointer;transition:0.3s;}
.photo-gallery img:hover{transform:scale(1.05);}
.route-stop{display:flex;justify-content:space-between;align-items:center;margin:5px 0;padding:8px;border-radius:6px;border:1px solid #ccc;gap:5px;}
.route-stop.completed{background:#22c55e;color:white;text-decoration:line-through;}
.route-stop button.photo-btn{background:#f59e0b;color:white;font-size:12px;padding:4px 8px;}
.route-photo{width:60px;height:45px;object-fit:cover;border-radius:4px;}
.tooltip{position:absolute;background:rgba(0,0,0,0.7);color:#fff;padding:5px 8px;border-radius:4px;font-size:12px;pointer-events:none;display:none;z-index:1000;}
</style>
</head>
<body class="light-theme">

<div id="themeToggle" onclick="toggleTheme()">Switch Theme</div>

<!-- LOGIN -->
<div id="loginSection">
  <div id="loginCard">
    <h1>Vending SaaS</h1>
    <input id="username" type="text" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <div class="keep-signed"><input type="checkbox" id="keepSignedIn"> Keep me signed in</div>
    <button onclick="login()">Login</button>
    <div id="msg"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
  <div id="sidebar">
    <button class="active" onclick="showSection('summarySection',this)">Summary</button>
    <button onclick="showSection('machinesSection',this)">Machines</button>
    <button onclick="showSection('productsSection',this)">Products</button>
    <button onclick="showSection('salesSection',this)">Sales</button>
    <button onclick="showSection('expensesSection',this)">Expenses</button>
    <button onclick="showSection('photosSection',this)">Photos</button>
    <button onclick="showSection('routesSection',this)">Routes</button>
    <button class="logout" onclick="logout()">Logout</button>
  </div>
  <div id="mainContent">
    <!-- SUMMARY -->
    <div id="summarySection">
      <div class="summary-grid">
        <div class="summary-card summary-machines"><div id="cardMachines">Machines: 0</div></div>
        <div class="summary-card summary-products"><div id="cardProducts">Products: 0</div></div>
        <div class="summary-card summary-sales"><div id="cardSales">Sales: 0</div></div>
        <div class="summary-card summary-expenses"><div id="cardExpenses">Expenses: $0</div></div>
      </div>
      <div class="card">
        <h3>Sales Analytics</h3>
        <canvas id="salesChart"></canvas>
      </div>
      <div class="card">
        <h3>Stock Levels</h3>
        <canvas id="stockChart"></canvas>
      </div>
    </div>

    <!-- MACHINES -->
    <div id="machinesSection" class="hidden card">
      <h3>Machines</h3>
      <input id="machineName" placeholder="Machine Name">
      <button onclick="addMachine()">Add</button>
      <table id="machinesTable"><thead><tr><th>Name</th><th>Action</th></tr></thead><tbody></tbody></table>
    </div>

    <!-- PRODUCTS -->
    <div id="productsSection" class="hidden card">
      <h3>Products</h3>
      <input id="productName" placeholder="Product Name">
      <input id="productStock" type="number" placeholder="Stock" min="0">
      <button onclick="addProduct()">Add</button>
      <table id="productsTable"><thead><tr><th>Name</th><th>Stock</th><th>Action</th></tr></thead><tbody></tbody></table>
    </div>

    <!-- SALES -->
    <div id="salesSection" class="hidden card">
      <h3>Sales</h3>
      <select id="saleProduct"></select>
      <input id="saleQty" type="number" placeholder="Qty" min="1">
      <button onclick="addSale()">Add Sale</button>
      <table id="salesTable"><thead><tr><th>Product</th><th>Qty</th><th>Action</th></tr></thead><tbody></tbody></table>
    </div>

    <!-- EXPENSES -->
    <div id="expensesSection" class="hidden card">
      <h3>Expenses</h3>
      <input id="expenseName" placeholder="Expense Name">
      <input id="expenseAmount" type="number" placeholder="Amount" min="0">
      <button onclick="addExpense()">Add</button>
      <table id="expensesTable"><thead><tr><th>Name</th><th>Amount</th><th>Action</th></tr></thead><tbody></tbody></table>
    </div>

    <!-- PHOTOS -->
    <div id="photosSection" class="hidden card">
      <h3>Photo Gallery</h3>
      <input type="file" id="photoInput">
      <button onclick="addPhoto()">Add Photo</button>
      <div class="photo-gallery" id="photoGallery"></div>
    </div>

    <!-- ROUTES -->
    <div id="routesSection" class="hidden card">
      <h3>Driver Routes</h3>
      <select id="driverSelect" onchange="renderRoute()"></select>
      <input id="stopName" placeholder="Stop Name">
      <button onclick="addStop()">Add Stop</button>
      <div id="routeStops"></div>
    </div>

  </div>
</div>

<script>
// --- THEME ---
function toggleTheme(){document.body.classList.toggle("dark-theme");document.body.classList.toggle("light-theme");}

// --- LOGIN ---
const users=[{username:"admin",password:"admin123",role:"admin"},{username:"driver1",password:"driver123",role:"driver"}];
if(!localStorage.getItem("machines")) localStorage.setItem("machines",JSON.stringify([]));
if(!localStorage.getItem("products")) localStorage.setItem("products",JSON.stringify([]));
if(!localStorage.getItem("sales")) localStorage.setItem("sales",JSON.stringify([]));
if(!localStorage.getItem("expenses")) localStorage.setItem("expenses",JSON.stringify([]));
if(!localStorage.getItem("photos")) localStorage.setItem("photos",JSON.stringify([]));
if(!localStorage.getItem("routes")) localStorage.setItem("routes",JSON.stringify([{driver:"driver1",stops:[]}]));

window.onload=function(){
  const savedUser=JSON.parse(localStorage.getItem("currentUser")||sessionStorage.getItem("currentUser")||"null");
  if(savedUser) showDashboard(savedUser.role);
  renderTables(); populateSaleProducts(); populateDrivers();
};
function login(){
  const username=document.getElementById("username").value.trim();
  const password=document.getElementById("password").value;
  const keep=document.getElementById("keepSignedIn").checked;
  const user=users.find(u=>u.username===username && u.password===password);
  if(!user){document.getElementById("msg").textContent="Invalid username or password";return;}
  if(keep){localStorage.setItem("currentUser",JSON.stringify(user)); sessionStorage.removeItem("currentUser");}
  else{sessionStorage.setItem("currentUser",JSON.stringify(user)); localStorage.removeItem("currentUser");}
  showDashboard(user.role);
}
function logout(){localStorage.removeItem("currentUser"); sessionStorage.removeItem("currentUser"); document.getElementById("loginSection").style.display="flex"; document.getElementById("dashboard").classList.add("hidden");}

// --- DASHBOARD ---
function showDashboard(role){
  document.getElementById("loginSection").style.display="none";
  document.getElementById("dashboard").classList.remove("hidden");
  renderTables(); populateSaleProducts(); populateDrivers(); renderRoute(); renderPhotos();
}

// --- NAVIGATION ---
function showSection(sectionId,btn){
  document.querySelectorAll('#mainContent > div').forEach(d=>d.classList.add('hidden'));
  document.getElementById(sectionId).classList.remove('hidden');
  document.querySelectorAll('#sidebar button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

// --- CRUD FUNCTIONS ---
function renderTables(){
  renderMachines(); renderProducts(); renderSales(); renderExpenses(); updateSummary();
}
function addMachine(){const val=document.getElementById("machineName").value.trim();if(!val)return;let arr=JSON.parse(localStorage.getItem("machines"));arr.push(val);localStorage.setItem("machines",JSON.stringify(arr));document.getElementById("machineName").value="";renderMachines();}
function renderMachines(){let arr=JSON.parse(localStorage.getItem("machines"));const tbody=document.querySelector("#machinesTable tbody");tbody.innerHTML="";arr.forEach((v,i)=>{const tr=document.createElement("tr");tr.innerHTML=`<td>${v}</td><td><button class="delete" onclick="deleteMachine(${i})">Delete</button></td>`;tbody.appendChild(tr);});updateSummary();}
function deleteMachine(i){let arr=JSON.parse(localStorage.getItem("machines"));arr.splice(i,1);localStorage.setItem("machines",JSON.stringify(arr));renderMachines();}

function addProduct(){const name=document.getElementById("productName").value.trim();const stock=parseInt(document.getElementById("productStock").value)||0;if(!name)return;let arr=JSON.parse(localStorage.getItem("products"));arr.push({name,stock});localStorage.setItem("products",JSON.stringify(arr));document.getElementById("productName").value="";document.getElementById("productStock").value="";renderProducts();}
function renderProducts(){let arr=JSON.parse(localStorage.getItem("products"));const tbody=document.querySelector("#productsTable tbody");tbody.innerHTML="";arr.forEach((p,i)=>{const tr=document.createElement("tr");tr.innerHTML=`<td>${p.name}</td><td>${p.stock}</td><td><button class="delete" onclick="deleteProduct(${i})">Delete</button></td>`;tbody.appendChild(tr);});updateSummary();populateSaleProducts();}
function deleteProduct(i){let arr=JSON.parse(localStorage.getItem("products"));arr.splice(i,1);localStorage.setItem("products",JSON.stringify(arr));renderProducts();}

function populateSaleProducts(){const sel=document.getElementById("saleProduct");sel.innerHTML="";JSON.parse(localStorage.getItem("products")).forEach(p=>{const opt=document.createElement("option");opt.value=p.name;opt.textContent=p.name;sel.appendChild(opt);});}

function addSale(){const product=document.getElementById("saleProduct").value;const qty=parseInt(document.getElementById("saleQty").value)||0;if(!product||qty<=0)return;let arr=JSON.parse(localStorage.getItem("sales"));arr.push({product,qty});localStorage.setItem("sales",JSON.stringify(arr));document.getElementById("saleQty").value="";renderSales();}
function renderSales(){const arr=JSON.parse(localStorage.getItem("sales"));const tbody=document.querySelector("#salesTable tbody");tbody.innerHTML="";arr.forEach((s,i)=>{const tr=document.createElement("tr");tr.innerHTML=`<td>${s.product}</td><td>${s.qty}</td><td><button class="delete" onclick="deleteSale(${i})">Delete</button></td>`;tbody.appendChild(tr);});updateSummary();}
function deleteSale(i){let arr=JSON.parse(localStorage.getItem("sales"));arr.splice(i,1);localStorage.setItem("sales",JSON.stringify(arr));renderSales();}

function addExpense(){const name=document.getElementById("expenseName").value.trim();const amount=parseInt(document.getElementById("expenseAmount").value)||0;if(!name||amount<=0)return;let arr=JSON.parse(localStorage.getItem("expenses"));arr.push({name,amount});localStorage.setItem("expenses",JSON.stringify(arr));document.getElementById("expenseName").value="";document.getElementById("expenseAmount").value="";renderExpenses();}
function renderExpenses(){const arr=JSON.parse(localStorage.getItem("expenses"));const tbody=document.querySelector("#expensesTable tbody");tbody.innerHTML="";arr.forEach((e,i)=>{const tr=document.createElement("tr");tr.innerHTML=`<td>${e.name}</td><td>${e.amount}</td><td><button class="delete" onclick="deleteExpense(${i})">Delete</button></td>`;tbody.appendChild(tr);});updateSummary();}
function deleteExpense(i){let arr=JSON.parse(localStorage.getItem("expenses"));arr.splice(i,1);localStorage.setItem("expenses",JSON.stringify(arr));renderExpenses();}

function updateSummary(){
  document.getElementById("cardMachines").textContent="Machines: "+JSON.parse(localStorage.getItem("machines")).length;
  document.getElementById("cardProducts").textContent="Products: "+JSON.parse(localStorage.getItem("products")).length;
  document.getElementById("cardSales").textContent="Sales: "+JSON.parse(localStorage.getItem("sales")).reduce((a,b)=>a+b.qty,0);
  document.getElementById("cardExpenses").textContent="Expenses: $"+JSON.parse(localStorage.getItem("expenses")).reduce((a,b)=>a+b.amount,0);
}

// --- PHOTOS ---
function addPhoto(){const input=document.getElementById("photoInput");if(!input.files[0])return;let arr=JSON.parse(localStorage.getItem("photos"));const reader=new FileReader();reader.onload=function(e){arr.push(e.target.result);localStorage.setItem("photos",JSON.stringify(arr));renderPhotos();};reader.readAsDataURL(input.files[0]);input.value="";}
function renderPhotos(){const arr=JSON.parse(localStorage.getItem("photos"));const gallery=document.getElementById("photoGallery");gallery.innerHTML="";arr.forEach(p=>{const img=document.createElement("img");img.src=p;gallery.appendChild(img);});}

// --- ROUTES ---
function populateDrivers(){const sel=document.getElementById("driverSelect");sel.innerHTML="";JSON.parse(localStorage.getItem("routes")).forEach(r=>{const opt=document.createElement("option");opt.value=r.driver;opt.textContent=r.driver;sel.appendChild(opt);});}
function addStop(){const stop=document.getElementById("stopName").value.trim();if(!stop)return;let routes=JSON.parse(localStorage.getItem("routes"));const driver=document.getElementById("driverSelect").value;const r=routes.find(r=>r.driver===driver);r.stops.push({name:stop,completed:false,photo:null});localStorage.setItem("routes",JSON.stringify(routes));document.getElementById("stopName").value="";renderRoute();}
function renderRoute(){const driver=document.getElementById("driverSelect").value;let routes=JSON.parse(localStorage.getItem("routes"));const r=routes.find(r=>r.driver===driver);const div=document.getElementById("routeStops");div.innerHTML="";r.stops.forEach((s,i)=>{const stopDiv=document.createElement("div");stopDiv.className="route-stop"+(s.completed?" completed":"");stopDiv.innerHTML=`<span>${s.name}</span><span><button onclick="completeStop(${i})">✓</button> <button class="photo-btn" onclick="addStopPhoto(${i})">📷</button>${s.photo?`<img class='route-photo' src='${s.photo}'>`:""}</span>`;div.appendChild(stopDiv);});}
function completeStop(i){let driver=document.getElementById("driverSelect").value;let routes=JSON.parse(localStorage.getItem("routes"));const r=routes.find(r=>r.driver===driver);r.stops[i].completed=!r.stops[i].completed;localStorage.setItem("routes",JSON.stringify(routes));renderRoute();}
function addStopPhoto(i){let input=document.createElement("input");input.type="file";input.accept="image/*";input.onchange=function(){if(!input.files[0])return;let reader=new FileReader();reader.onload=function(e){let driver=document.getElementById("driverSelect").value;let routes=JSON.parse(localStorage.getItem("routes"));const r=routes.find(r=>r.driver===driver);r.stops[i].photo=e.target.result;localStorage.setItem("routes",JSON.stringify(routes));renderRoute();};reader.readAsDataURL(input.files[0]);};input.click();}
</script>
</body>
</html>
