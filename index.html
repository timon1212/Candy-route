<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candy Route Secure System</title>

<style>
body{
font-family:Arial;
background:#121212;
color:white;
padding:20px;
}
input,button,select{
width:100%;
padding:10px;
margin:6px 0;
border-radius:6px;
border:none;
}
button{
background:#00c853;
color:white;
font-weight:bold;
}
button.danger{
background:#c62828;
}
.card{
background:#1e1e1e;
padding:15px;
margin:10px 0;
border-radius:10px;
}
</style>
</head>
<body>

<div id="loginSection">
<h2>Login</h2>
<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">

<h2 id="welcome"></h2>
<button class="danger" onclick="logout()">Logout</button>

<div id="adminPanel" style="display:none;">
<h3>Create User</h3>
<input id="newUser" placeholder="Username">
<input id="newPass" type="password" placeholder="Password">
<select id="newRole">
<option value="worker">Worker</option>
<option value="admin">Admin</option>
</select>
<button onclick="createUser()">Create User</button>
</div>

<h3>Products</h3>

<div id="productSection" style="display:none;">
<input id="productName" placeholder="Product Name">
<input id="productCost" type="number" placeholder="Cost">
<input id="productPrice" type="number" placeholder="Price">
<input id="productStock" type="number" placeholder="Stock">
<button onclick="addProduct()">Add Product</button>
</div>

<div id="products"></div>

</div>

<script>

/* ================= USERS ================= */

let defaultAdmin = {
username:"admin",
password:"admin123",
role:"admin"
};

function getUsers(){
return JSON.parse(localStorage.getItem("users") || "[]");
}

function saveUsers(users){
localStorage.setItem("users",JSON.stringify(users));
}

/* Create default admin if none exists */
if(getUsers().length === 0){
saveUsers([defaultAdmin]);
}

/* ================= LOGIN ================= */

let currentUser = null;

function login(){
let username = document.getElementById("loginUser").value;
let password = document.getElementById("loginPass").value;

let users = getUsers();
let user = users.find(u => u.username === username && u.password === password);

if(!user){
alert("Invalid login");
return;
}

currentUser = user;
localStorage.setItem("currentUser",JSON.stringify(user));

document.getElementById("loginSection").style.display="none";
document.getElementById("app").style.display="block";

document.getElementById("welcome").innerText =
"Logged in as: " + user.username + " (" + user.role + ")";

if(user.role === "admin"){
document.getElementById("adminPanel").style.display="block";
document.getElementById("productSection").style.display="block";
}

renderProducts();
}

function logout(){
localStorage.removeItem("currentUser");
location.reload();
}

/* ================= USER CREATION ================= */

function createUser(){
if(currentUser.role !== "admin"){
alert("Only admin can create users");
return;
}

let username = document.getElementById("newUser").value;
let password = document.getElementById("newPass").value;
let role = document.getElementById("newRole").value;

let users = getUsers();

if(users.find(u => u.username === username)){
alert("User already exists");
return;
}

users.push({username,password,role});
saveUsers(users);

alert("User Created");
}

/* ================= PRODUCTS ================= */

function getProducts(){
return JSON.parse(localStorage.getItem("products") || "[]");
}

function saveProducts(products){
localStorage.setItem("products",JSON.stringify(products));
}

function addProduct(){
if(currentUser.role !== "admin"){
alert("No permission");
return;
}

let name = document.getElementById("productName").value;
let cost = parseFloat(document.getElementById("productCost").value);
let price = parseFloat(document.getElementById("productPrice").value);
let stock = parseInt(document.getElementById("productStock").value);

if(!name || !cost || !price || !stock){
alert("Fill all fields");
return;
}

let products = getProducts();
products.push({name,cost,price,stock});
saveProducts(products);

renderProducts();
}

function sellProduct(index){
let products = getProducts();

if(products[index].stock <= 0){
alert("Out of stock");
return;
}

products[index].stock -= 1;
saveProducts(products);
renderProducts();
}

function renderProducts(){
let container = document.getElementById("products");
container.innerHTML="";

let products = getProducts();

products.forEach((p,index)=>{

let profit = (p.price - p.cost).toFixed(2);

let div = document.createElement("div");
div.className="card";

div.innerHTML = `
<b>${p.name}</b><br>
Cost: $${p.cost}<br>
Price: $${p.price}<br>
Stock: ${p.stock}<br>
Profit per unit: $${profit}<br>
<button onclick="sellProduct(${index})">Record Sale</button>
`;

container.appendChild(div);
});
}

/* ================= AUTO LOGIN ================= */

window.onload = function(){

let savedUser = localStorage.getItem("currentUser");

if(savedUser){
currentUser = JSON.parse(savedUser);

document.getElementById("loginSection").style.display="none";
document.getElementById("app").style.display="block";

document.getElementById("welcome").innerText =
"Logged in as: " + currentUser.username + " (" + currentUser.role + ")";

if(currentUser.role === "admin"){
document.getElementById("adminPanel").style.display="block";
document.getElementById("productSection").style.display="block";
}

renderProducts();
}
};

</script>

</body>
</html>
