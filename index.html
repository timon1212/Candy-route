<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fix Test</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

/* Sidebar */

.sidebar{
width:200px;
height:100vh;
background:#222;
padding:20px;
position:fixed;
left:0;
top:0;
}

.sidebar button{
width:100%;
margin:8px 0;
}

/* Main */

.main{
margin-left:200px;
padding:30px;
}

/* Section */

.section{
display:none;
}

/* Cards */

.card{
background:#333;
padding:20px;
border-radius:10px;
margin:10px 0;
}

/* Buttons */

button{
background:#00e676;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

</style>
</head>
<body>

<!-- SIDEBAR -->

<div class="sidebar">
<h3>Menu</h3>
<button onclick="show('home')">Home</button>
<button onclick="show('products')">Products</button>
</div>

<!-- MAIN -->

<div class="main">

<div id="home" class="section">
<div class="card">
<h2>✅ HOME WORKING</h2>
<p>If you see this, layout is fixed.</p>
</div>
</div>

<div id="products" class="section">
<div class="card">
<h2>📦 PRODUCTS WORKING</h2>
<p>This proves sections switch correctly.</p>
</div>
</div>

</div>

<script>

/* Section Switch */

function show(id){

document.querySelectorAll(".section").forEach(sec=>{
sec.style.display="none";
});

document.getElementById(id).style.display="block";

}

/* Load Default */

document.addEventListener("DOMContentLoaded",()=>{
show("home");
});

</script>

</body>
</html>
