<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enterprise Control System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

.sidebar{
width:220px;
height:100vh;
background:#1c1c1c;
padding:20px;
position:fixed;
left:0;
top:0;
box-sizing:border-box;
}

.sidebar button{
width:100%;
margin:6px 0;
}

.main{
margin-left:220px;
padding:30px;
}

.section{ display:none; }

.card{
background:#222;
padding:15px;
border-radius:10px;
margin:10px 0;
}

button{
background:#00e676;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

input,select{
width:100%;
padding:8px;
margin:6px 0;
border-radius:6px;
border:none;
background:#2a2a2a;
color:white;
box-sizing:border-box;
}
</style>
</head>
<body>

<div class="sidebar">
<h3>System</h3>
<div id="sidebarButtons"></div>
<button onclick="logout()">Logout</button>
</div>

<div class="main">

<!-- REPUTATION -->
<div id="reputationSection" class="section">
<div class="card">
<h2>⭐ Reputation</h2>
<button onclick="renderReputation()">Refresh</button>
<div id="reputationContent"></div>
</div>
</div>

<!-- AI -->
<div id="aiSection" class="section">
<div class="card">
<h2>🧠 Smart AI</h2>
<button onclick="runAI()">Run AI Analysis</button>
<pre id="aiOutput" style="white-space:pre-wrap;"></pre>
</div>
</div>

</div>

<script>

/* =====================================================
   STORAGE HELPERS
===================================================== */

function getUsers(){ return JSON.parse(localStorage.getItem("users")||"[]"); }
function getRoutes(){ return JSON.parse(localStorage.getItem("routes")||"[]"); }
function getProducts(){ return JSON.parse(localStorage.getItem("products")||"[]"); }

/* =====================================================
   REPUTATION SYSTEM
===================================================== */

function getReputation(){
return JSON.parse(localStorage.getItem("driverReputation")||"[]");
}

function saveReputation(data){
localStorage.setItem("driverReputation",JSON.stringify(data));
}

function updateReputation(){

let drivers=getUsers().filter(u=>u.role==="driver");
let routes=getRoutes();
let reputation=getReputation();

drivers.forEach(driver=>{

let driverRoutes=routes.filter(r=>r.assignedTo===driver.username);

let completed=driverRoutes.filter(r=>r.status==="Completed").length;
let total=driverRoutes.length;

let score= total===0 ? 50 : (completed/total)*100;
score=Math.max(0,Math.min(100,score));

let existing=reputation.find(r=>r.driver===driver.username);

if(existing){
existing.score=score;
existing.date=new Date().toISOString();
}else{
reputation.push({
driver:driver.username,
score:score,
date:new Date().toISOString()
});
}

});

saveReputation(reputation);
}

function renderReputation(){

updateReputation();

let reputation=getReputation();
reputation.sort((a,b)=>b.score-a.score);

let output="<h3>Driver Rankings</h3>";

reputation.forEach((r,i)=>{

let medal="";
if(i===0) medal="🥇";
else if(i===1) medal="🥈";
else if(i===2) medal="🥉";

output+=`
<div class="card">
${medal} ${r.driver}<br>
⭐ ${r.score.toFixed(2)}/100<br>
📅 ${r.date}
</div>
`;

});

document.getElementById("reputationContent").innerHTML=output;
}

/* =====================================================
   WARNING SYSTEM (AUTO + AUTO REMOVE)
===================================================== */

function getWarnings(){
return JSON.parse(localStorage.getItem("driverWarnings")||"[]");
}

function saveWarnings(data){
localStorage.setItem("driverWarnings",JSON.stringify(data));
}

function checkWarnings(){

let warnings=getWarnings();
let reputation=getReputation();
let now=new Date();
let message="";

reputation.forEach(r=>{

/* REMOVE IF IMPROVED */
warnings=warnings.filter(w=>{
if(w.driver!==r.driver) return true;

if(r.score>50){
message+=`✅ Warning removed: ${r.driver}\n`;
return false;
}

/* EXPIRE AFTER 7 DAYS */
let diff=(now-new Date(w.date))/(1000*60*60*24);
if(diff>7){
message+=`⏳ Warning expired: ${r.driver}\n`;
return false;
}

return true;
});

/* ISSUE NEW WARNING */
if(r.score<40){
let exists=warnings.find(w=>w.driver===r.driver);
if(!exists){
warnings.push({
driver:r.driver,
trend:r.score,
date:new Date().toISOString()
});
message+=`⚠ Warning issued: ${r.driver}\n`;
}
}

});

saveWarnings(warnings);

if(message!==""){
document.getElementById("aiOutput").innerText=
"🚨 Warning Update\n\n"+message;
}
}

/* =====================================================
   AUTO REASSIGN BASED ON PERFORMANCE
===================================================== */

function autoReassign(){

let routes=getRoutes();
let users=getUsers();
let drivers=users.filter(u=>u.role==="driver");
let reputation=getReputation();

let ranked=drivers.sort((a,b)=>{

let sa=reputation.find(r=>r.driver===a.username)?.score||50;
let sb=reputation.find(r=>r.driver===b.username)?.score||50;

return sb-sa;

});

routes.forEach(route=>{
if(route.assignedTo) return;
if(ranked.length>0){
route.assignedTo=ranked[0].username;
}
});

localStorage.setItem("routes",JSON.stringify(routes));
}

/* =====================================================
   SMART INSTANT AI
===================================================== */

function runAI(){

let routes=getRoutes();
let products=getProducts();
let reputation=getReputation();
let warnings=getWarnings();

let completed=routes.filter(r=>r.status==="Completed").length;
let pending=routes.filter(r=>r.status==="Pending").length;

let lowStock=products.filter(p=>p.stock<5);
let lowRep=reputation.filter(r=>r.score<50);

let report="🤖 SMART AI REPORT\n\n";
report+=`Completed Routes: ${completed}\n`;
report+=`Pending Routes: ${pending}\n\n`;

report+="📦 Stock\n";
lowStock.forEach(p=>{
report+=`⚠ ${p.name} low (${p.stock})\n`;
});

report+="\n⭐ Low Reputation\n";
lowRep.forEach(r=>{
report+=`⚡ ${r.driver} (${r.score})\n`;
});

report+="\n🚨 Warnings\n";
warnings.forEach(w=>{
report+=`${w.driver} | Trend ${w.trend}\n`;
});

document.getElementById("aiOutput").innerText=report;

}

/* =====================================================
   SIDEBAR
===================================================== */

function loadSidebar(){

let buttons=[
{label:"Reputation",section:"reputation"},
{label:"AI",section:"ai"}
];

let container=document.getElementById("sidebarButtons");

buttons.forEach(b=>{
let btn=document.createElement("button");
btn.innerText=b.label;
btn.onclick=()=>showSection(b.section);
container.appendChild(btn);
});

}

function showSection(section){

document.querySelectorAll(".section").forEach(s=>s.style.display="none");

let el=document.getElementById(section+"Section");
if(el) el.style.display="block";

if(section==="reputation") renderReputation();
}

/* =====================================================
   LOGIN / LOGOUT
===================================================== */

function logout(){
localStorage.removeItem("currentUser");
location.reload();
}

/* =====================================================
   AUTO LOOP
===================================================== */

setInterval(()=>{
updateReputation();
checkWarnings();
autoReassign();
},60000);

/* INIT */

document.addEventListener("DOMContentLoaded",()=>{
loadSidebar();
showSection("reputation");
});

</script>

</body>
</html>
