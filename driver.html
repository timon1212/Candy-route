<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DayNight Vending - Driver Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;background:#0f172a;color:white;font-family:Arial,Helvetica,sans-serif}
header{background:#020617;padding:15px 20px;display:flex;justify-content:space-between;align-items:center}
h1{margin:0;font-size:20px}
.status{font-size:13px}
.online{color:#22c55e}
.offline{color:#ef4444}
.container{padding:25px}
.card{background:#020617;padding:20px;border-radius:12px;margin-bottom:20px}
button{padding:8px 12px;border:none;border-radius:8px;background:#2563eb;color:white;cursor:pointer;margin-left:8px}
button:hover{background:#1d4ed8}
.problem{background:#dc2626}
.problem:hover{background:#b91c1c}
.refilled{background:#22c55e}
.refilled:hover{background:#16a34a}
.item{background:#1e293b;padding:10px;border-radius:8px;margin-top:10px;display:flex;justify-content:space-between;align-items:center}
.logout{background:#f59e0b}
.logout:hover{background:#d97706}
</style>
</head>

<body>

<header>
    <h1>Driver Panel</h1>
    <div id="status" class="status">Checking...</div>
    <button class="logout" onclick="logout()">Logout</button>
</header>

<div class="container">

<div class="card">
<h2>My Machines</h2>
<div id="machineList"></div>
</div>

<div class="card">
<h2>My Schedule</h2>
<div id="scheduleList"></div>
</div>

</div>

<script>
/* ---------- DB FUNCTIONS ---------- */
function getDB(){ return JSON.parse(localStorage.getItem("DNV_DB")); }
function saveDB(db){ localStorage.setItem("DNV_DB",JSON.stringify(db)); }

/* ---------- ONLINE STATUS ---------- */
function updateStatus(){
    const s=document.getElementById("status");
    if(navigator.onLine){s.textContent="ONLINE"; s.className="status online";}
    else{s.textContent="OFFLINE"; s.className="status offline";}
}
window.addEventListener("online",updateStatus);
window.addEventListener("offline",updateStatus);
updateStatus();

/* ---------- AUTH ---------- */
let db=getDB();
let current=db.users.find(u=>u.username===db.currentUser);

if(!current || current.role!=="driver"){
    alert("Not authorized");
    location="index.html";
}

let driver=current.username;

/* ---------- LOGOUT ---------- */
function logout(){
    db.currentUser=null;
    saveDB(db);
    location="index.html";
}

/* ---------- MACHINES ---------- */
if(!db.machines) db.machines=[];

/* ---------- RENDER ASSIGNED MACHINES ---------- */
function renderMachines(){
    machineList.innerHTML="";
    db.machines.forEach(m=>{
        if(m.driver===driver){
            const div=document.createElement("div");
            div.className="item";
            div.innerHTML=`
                <span>${m.name} - ${m.location} - Type: ${m.type} - Status: ${m.status || 'active'}</span>
                <span>
                    <button class="refilled" onclick="updateStatusFunc(${m.id},'refilled')">Refilled</button>
                    <button class="problem" onclick="updateStatusFunc(${m.id},'problem')">Problem</button>
                </span>
            `;
            machineList.appendChild(div);
        }
    });
}

/* ---------- UPDATE MACHINE STATUS ---------- */
function updateStatusFunc(id,status){
    const machine=db.machines.find(m=>m.id===id);
    if(machine){
        machine.status=status;
        saveDB(db);
        renderMachines();
        generateSchedule();
    }
}

/* ---------- SCHEDULE ---------- */
function generateSchedule(){
    scheduleList.innerHTML="";
    const today = new Date();
    const weekNumber = Math.ceil(today.getDate() / 7);
    const monthNumber = today.getMonth() + 1;

    db.machines.forEach(m=>{
        if(m.driver!==driver) return;

        let include=false;

        switch(m.type){
            case "honor": include=true; break; // every week
            case "claw":
            case "candy": include=true; break; // monthly
            case "vending": include=weekNumber%2===0; break; // twice per month
        }

        if(include){
            const div=document.createElement("div");
            div.className="item";
            div.innerHTML=`
                <span>${m.name} - ${m.location} - Type: ${m.type} - Status: ${m.status || 'active'}</span>
                <button class="refilled" onclick="markDone(${m.id})">Done</button>
            `;
            scheduleList.appendChild(div);
        }
    });
}

function markDone(id){
    const machine=db.machines.find(m=>m.id===id);
    if(machine){
        machine.status="done";
        saveDB(db);
        renderMachines();
        generateSchedule();
    }
}

/* ---------- INIT ---------- */
renderMachines();
generateSchedule();

</script>

</body>
</html>
