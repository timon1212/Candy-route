<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DayNight Vending - Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#0f172a;
    color:white;
}

header{
    background:#020617;
    padding:15px 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 3px 15px rgba(0,0,0,.6);
}

h1{
    margin:0;
    font-size:20px;
}

.status{
    font-size:14px;
    padding:6px 12px;
    border-radius:8px;
    background:#1e293b;
}

.online{color:#22c55e;}
.offline{color:#ef4444;}

.container{
    padding:30px;
}

.card{
    background:#020617;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 5px 25px rgba(0,0,0,.5);
}

input,button{
    padding:10px;
    border:none;
    border-radius:8px;
    margin:5px 0;
    font-size:14px;
}

input{
    width:100%;
    background:#1e293b;
    color:white;
}

button{
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.driver{
    background:#1e293b;
    padding:12px;
    border-radius:10px;
    margin-top:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.delete{
    background:#dc2626;
}
.delete:hover{
    background:#b91c1c;
}

.logout{
    background:#f59e0b;
}
.logout:hover{
    background:#d97706;
}
</style>
</head>

<body>

<header>
    <h1>DayNight Vending Admin</h1>
    <div class="status" id="status">Checking...</div>
    <button class="logout" onclick="logout()">Logout</button>
</header>

<div class="container">

<div class="card">
    <h2>Create Driver</h2>
    <input id="newUser" placeholder="Driver Username">
    <input id="newPass" placeholder="Driver Password">
    <button onclick="createDriver()">Create Driver</button>
</div>

<div class="card">
    <h2>Drivers</h2>
    <div id="driverList"></div>
</div>

</div>

<script>

/* ---------- ONLINE STATUS ---------- */
function updateStatus(){
    const el=document.getElementById("status");
    if(navigator.onLine){
        el.textContent="ONLINE";
        el.className="status online";
    }else{
        el.textContent="OFFLINE";
        el.className="status offline";
    }
}
window.addEventListener("online",updateStatus);
window.addEventListener("offline",updateStatus);
updateStatus();


/* ---------- SECURITY CHECK ---------- */
const currentUser=localStorage.getItem("currentUser");

if(!currentUser || JSON.parse(currentUser).role!=="admin"){
    alert("Not authorized");
    window.location.href="index.html";
}


/* ---------- USER STORAGE ---------- */
let users=JSON.parse(localStorage.getItem("users"))||[];


/* ---------- CREATE DRIVER ---------- */
function createDriver(){

    const username=document.getElementById("newUser").value.trim();
    const password=document.getElementById("newPass").value.trim();

    if(!username||!password){
        alert("Fill all fields");
        return;
    }

    if(users.find(u=>u.username===username)){
        alert("User already exists");
        return;
    }

    users.push({
        username:username,
        password:password,
        role:"driver"
    });

    localStorage.setItem("users",JSON.stringify(users));

    document.getElementById("newUser").value="";
    document.getElementById("newPass").value="";

    renderDrivers();
}


/* ---------- DELETE DRIVER ---------- */
function deleteDriver(name){
    if(!confirm("Delete "+name+"?")) return;

    users=users.filter(u=>u.username!==name);
    localStorage.setItem("users",JSON.stringify(users));
    renderDrivers();
}


/* ---------- RENDER DRIVER LIST ---------- */
function renderDrivers(){
    const list=document.getElementById("driverList");
    list.innerHTML="";

    users.filter(u=>u.role==="driver").forEach(driver=>{
        const div=document.createElement("div");
        div.className="driver";

        div.innerHTML=`
            <span>${driver.username}</span>
            <button class="delete" onclick="deleteDriver('${driver.username}')">Delete</button>
        `;

        list.appendChild(div);
    });
}

renderDrivers();


/* ---------- LOGOUT ---------- */
function logout(){
    localStorage.removeItem("currentUser");
    window.location.href="index.html";
}

</script>

</body>
</html>
