<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Enterprise System</title>

<style>

/* ================= BASE ================= */

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

button{
background:#00e676;
border:none;
padding:8px 12px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

input,select{
width:100%;
padding:8px;
margin:5px 0;
border-radius:6px;
border:none;
box-sizing:border-box;
}

/* ================= TOP NAV ================= */

.navbar{
background:#111;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
position:relative;
}

.dropdown{
display:none;
position:absolute;
right:15px;
top:60px;
background:#1c1c1c;
padding:10px;
border-radius:8px;
width:220px;
z-index:999;
}

.dropdown button{
width:100%;
margin:5px 0;
}

/* ================= MAIN ================= */

.main{
padding:20px;
}

.section{
display:none;
}

.card{
background:#1c1c1c;
padding:15px;
border-radius:10px;
margin:10px 0;
}

img{
max-width:100%;
border-radius:8px;
margin:5px;
}

.low-stock{
border:3px solid red;
}

</style>
</head>
<body>

<!-- ================= LOGIN ================= -->

<div id="loginSection">
<h2 style="padding:20px;">Login</h2>
<div style="padding:20px;">
<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<div id="app" style="display:none;">

<!-- ================= TOP NAV ================= -->

<div class="navbar">

<h3 style="margin:0;">🚀 Dashboard</h3>

<div style="position:relative;">
<button onclick="toggleDropdown()">☰ Menu</button>

<div id="dropdownMenu" class="dropdown">

<button onclick="showSection('home')">🏠 Home</button>
<button onclick="showSection('products')">📦 Products</button>
<button onclick="showSection('ai')">🤖 AI</button>
<button onclick="showSection('routes')">🗺 Routes</button>
<button onclick="showSection('users')">👤 Users</button>
<button onclick="showSection('audit')">🕵 Audit</button>
<button onclick="showSection('analytics')">📊 Analytics</button>
<button onclick="logout()">🚪 Logout</button>

</div>
</div>

</div>

<!-- ================= MAIN CONTENT ================= -->

<div class="main">

<!-- HOME -->

<div id="homeSection" class="section">
<h2>🏠 Home</h2>
<p>Welcome to your Smart Business System</p>
</div>

<!-- PRODUCTS -->

<div id="productsSection" class="section">

<h2>📦 Products</h2>

<input id="productName" placeholder="Product">
<input id="productCost" type="number" placeholder="Cost">
<input id="productPrice" type="number" placeholder="Price">
<input id="productStock" type="number" placeholder="Stock">
<input id="productImages" type="file" multiple accept="image/*">

<button onclick="addProduct()">Add Product</button>

<div id="products"></div>

</div>

<!-- AI -->

<div id="aiSection" class="section">
<h2>🤖 AI Pricing</h2>
<div id="pricingAI"></div>
<button onclick="renderPricingAI()">Run AI</button>
</div>

<!-- ROUTES -->

<div id="routesSection" class="section">

<h2>🗺 Routes</h2>

<input id="routeName" placeholder="Route Name">
<input id="routeAddress" placeholder="Address">
<button onclick="addRoute()">Add Route</button>

<div id="routeList"></div>

<h3>📍 Map</h3>
<div id="map" style="height:350px;border-radius:10px;"></div>

</div>

<!-- USERS -->

<div id="usersSection" class="section">

<h2>👤 Users</h2>

<input id="newUsername" placeholder="Username">
<input id="newPassword" type="password" placeholder="Password">

<select id="newRole">
<option value="admin">Admin</option>
<option value="manager">Manager</option>
<option value="viewer">Viewer</option>
</select>

<button onclick="createUser()">Create User</button>

<div id="userList"></div>

</div>

<!-- AUDIT -->

<div id="auditSection" class="section">
<h2>🕵 Audit Logs</h2>
<div id="auditContainer"></div>
</div>

<!-- ANALYTICS -->

<div id="analyticsSection" class="section">
<h2>📊 Analytics</h2>
<div class="card" id="statsBox"></div>
</div>

</div>
</div>

<script>

/* ================= DROPDOWN FIX ================= */

function toggleDropdown(){

let menu=document.getElementById("dropdownMenu");

if(menu.style.display==="block"){
menu.style.display="none";
}else{
menu.style.display="block";
}

}

/* Close dropdown when clicking outside */

document.addEventListener("click",function(e){

let menu=document.getElementById("dropdownMenu");
let button=e.target.closest("button");

if(!menu) return;

if(!menu.contains(e.target) && !button){
menu.style.display="none";
}

});

/* ================= LOGIN ================= */

function getUsers(){
return JSON.parse(localStorage.getItem("users")||"[]");
}

function saveUsers(u){
localStorage.setItem("users",JSON.stringify(u));
}

if(getUsers().length===0){
saveUsers([{username:"admin",password:"admin",role:"admin"}]);
}

function login(){

let u=document.getElementById("loginUser").value;
let p=document.getElementById("loginPass").value;

let user=getUsers().find(x=>x.username===u && x.password===p);

if(!user){
alert("Invalid Login ❌");
return;
}

localStorage.setItem("currentUser",JSON.stringify(user));

document.getElementById("loginSection").style.display="none";
document.getElementById("app").style.display="block";

showSection("home");

}

function logout(){
localStorage.removeItem("currentUser");
location.reload();
}

/* ================= SECTION SWITCH ================= */

function showSection(section){

document.querySelectorAll(".section").forEach(s=>{
s.style.display="none";
});

document.getElementById(section+"Section").style.display="block";

if(section==="users") renderUsers();
if(section==="audit") renderAuditLogs();
if(section==="analytics") renderAnalytics();
if(section==="routes") initMap();

}

/* ================= PRODUCTS ================= */

function getProducts(){
return JSON.parse(localStorage.getItem("products")||"[]");
}

function saveProducts(p){
localStorage.setItem("products",JSON.stringify(p));
}

function addProduct(){

let name=document.getElementById("productName").value;
let cost=parseFloat(document.getElementById("productCost").value);
let price=parseFloat(document.getElementById("productPrice").value);
let stock=parseInt(document.getElementById("productStock").value);
let files=document.getElementById("productImages").files;

let products=getProducts();
let images=[];

if(files.length>0){

let loaded=0;

for(let i=0;i<files.length;i++){

let reader=new FileReader();

reader.onload=function(){
images.push(reader.result);
loaded++;

if(loaded===files.length){
products.push({name,cost,price,stock,sales:0,images});
saveProducts(products);
render();
}
};

reader.readAsDataURL(files[i]);

}

}else{

products.push({name,cost,price,stock,sales:0,images:[]});
saveProducts(products);
render();
}

}

function render(){

let container=document.getElementById("products");
if(!container) return;

container.innerHTML="";

let products=getProducts();

products.forEach((p,i)=>{

let imgHtml="";

if(p.images){
p.images.forEach(img=>{
imgHtml+=`<img src="${img}" style="max-width:100px;">`;
});
}

let div=document.createElement("div");
div.className="card";

if(p.stock<=5){
div.classList.add("low-stock");
}

div.innerHTML=`
${imgHtml}
<b>${p.name}</b><br>
Stock: ${p.stock}
`;

container.appendChild(div);

});

renderPricingAI();
renderAnalytics();
renderAuditLogs();

}

/* ================= AI ================= */

function renderPricingAI(){

let products=getProducts();
let container=document.getElementById("pricingAI");
if(!container) return;

container.innerHTML="";

products.forEach(p=>{

let margin=((p.price-p.cost)/p.price)*100;

if(margin<20){

let suggested=(p.cost*1.3).toFixed(2);

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
🤖 Suggest Increase<br>
<b>${p.name}</b><br>
Suggested: $${suggested}
`;

container.appendChild(div);

}

});

}

/* ================= ROUTES ================= */

let map;

function initMap(){

map=new google.maps.Map(document.getElementById("map"),{
center:{lat:29.95,lng:-90.07},
zoom:10
});

renderRouteMarkers();

}

function getRoutes(){
return JSON.parse(localStorage.getItem("routes")||"[]");
}

function saveRoutes(r){
localStorage.setItem("routes",JSON.stringify(r));
}

function addRoute(){

let name=document.getElementById("routeName").value;
let address=document.getElementById("routeAddress").value;

let routes=getRoutes();
routes.push({name,address,date:new Date().toLocaleString()});

saveRoutes(routes);

renderRoutes();
renderRouteMarkers();

}

function renderRoutes(){

let routes=getRoutes();
let container=document.getElementById("routeList");
container.innerHTML="";

routes.forEach(r=>{

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<b>${r.name}</b><br>
📍 ${r.address}
`;

container.appendChild(div);

});

}

/* ================= USERS ================= */

function createUser(){

let username=document.getElementById("newUsername").value;
let password=document.getElementById("newPassword").value;
let role=document.getElementById("newRole").value;

let users=getUsers();
users.push({username,password,role});

saveUsers(users);
renderUsers();

}

function renderUsers(){

let users=getUsers();
let container=document.getElementById("userList");
container.innerHTML="";

users.forEach((u,i)=>{

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<b>${u.username}</b><br>
Role: ${u.role}
`;

container.appendChild(div);

});

}

/* ================= AUDIT ================= */

function logAction(action,details){

let logs=JSON.parse(localStorage.getItem("auditLogs")||"[]");

logs.push({
action,
details,
time:new Date().toLocaleString()
});

localStorage.setItem("auditLogs",JSON.stringify(logs));

}

function renderAuditLogs(){

let logs=JSON.parse(localStorage.getItem("auditLogs")||"[]");
let container=document.getElementById("auditContainer");
container.innerHTML="";

logs.slice().reverse().forEach(l=>{

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<b>${l.time}</b><br>
${l.action}<br>
${l.details}
`;

container.appendChild(div);

});

}

/* ================= ANALYTICS ================= */

function renderAnalytics(){

let products=getProducts();
let users=getUsers();

let totalProducts=products.length;
let totalStock=0;
let revenue=0;

products.forEach(p=>{
totalStock+=p.stock;
revenue+=(p.sales||0)*p.price;
});

document.getElementById("statsBox").innerHTML=`
📦 Products: ${totalProducts}<br>
📊 Stock: ${totalStock}<br>
💰 Revenue: $${revenue.toFixed(2)}<br>
👤 Users: ${users.length}
`;

}

/* ================= MAP MARKERS ================= */

function renderRouteMarkers(){

if(!map) return;

let routes=getRoutes();

routes.forEach(r=>{

let geocoder=new google.maps.Geocoder();

geocoder.geocode({address:r.address},function(results,status){

if(status==="OK"){

new google.maps.Marker({
map:map,
position:results[0].geometry.location,
title:r.name
});

}

});

});

}

/* ================= INIT ================= */

document.addEventListener("DOMContentLoaded",()=>{
render();
});

</script>

<!-- GOOGLE MAPS (PUT YOUR API KEY HERE) -->
<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap" async defer></script>

</body>
</html>
